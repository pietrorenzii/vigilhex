<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>VIGILHEX RADAR</title>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r152/three.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/three@0.152/examples/js/controls/OrbitControls.js"></script>

<style>
body{
  margin:0;
  overflow:hidden;
  background:#000;
  color:#fff;
  font-family:Arial;
}

#hdr{
  position:fixed;
  top:0;
  left:0;
  right:0;
  height:40px;
  background:#111;
  display:flex;
  align-items:center;
  justify-content:space-between;
  padding:0 10px;
  z-index:10;
}

canvas{
  display:block;
}
</style>
</head>

<body>

<div id="hdr">
  <div>VIGILHEX RADAR</div>
  <div id="status">BOOT</div>
</div>

<script>
let scene, camera, renderer, globe;

init();
animate();

function init(){

  // SCENE
  scene = new THREE.Scene();

  // CAMERA
  camera = new THREE.PerspectiveCamera(
    60,
    window.innerWidth / window.innerHeight,
    0.1,
    1000
  );
  camera.position.z = 3;

  // RENDERER (ATTACCATO DIRETTAMENTE AL BODY)
  renderer = new THREE.WebGLRenderer({antialias:true});
  renderer.setSize(window.innerWidth, window.innerHeight);
  document.body.appendChild(renderer.domElement);

  // GLOBO (SENZA TEXTURE → ZERO RISCHI)
  const geometry = new THREE.SphereGeometry(1, 32, 32);

  const material = new THREE.MeshBasicMaterial({
    color: 0x00ff88,
    wireframe: true
  });

  globe = new THREE.Mesh(geometry, material);
  scene.add(globe);

  // PUNTI TEST
  const dot = new THREE.Mesh(
    new THREE.SphereGeometry(0.05, 8, 8),
    new THREE.MeshBasicMaterial({color:0xff0000})
  );
  dot.position.set(1.2,0,0);
  scene.add(dot);

  // RESIZE
  window.addEventListener("resize", () => {
    camera.aspect = window.innerWidth / window.innerHeight;
    camera.updateProjectionMatrix();
    renderer.setSize(window.innerWidth, window.innerHeight);
  });

  document.getElementById("status").innerText = "RENDER OK";
}

function animate(){
  requestAnimationFrame(animate);

  globe.rotation.y += 0.01;

  renderer.render(scene, camera);
}
</script>

</body>
</html>
