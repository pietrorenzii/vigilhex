<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>VIGILHEX RADAR</title>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r152/three.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/three@0.152/examples/js/controls/OrbitControls.js"></script>

<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&display=swap" rel="stylesheet">

<style>
body{margin:0;background:#020304;color:#aaa;font-family:Orbitron;overflow:hidden}

#hdr{
  position:fixed;top:0;left:0;right:0;height:40px;
  background:#050708;border-bottom:1px solid #1a2a30;
  display:flex;align-items:center;justify-content:space-between;
  padding:0 15px;color:#fff;z-index:10;
}

#globe{
  position:absolute;
  top:40px;
  width:100%;
  height:calc(100% - 40px);
}

.panel{
  position:absolute;
  right:0;
  top:40px;
  width:260px;
  height:calc(100% - 40px);
  background:#050708;
  border-left:1px solid #1a2a30;
  padding:10px;
}

.stat{
  background:#0a0f12;
  border:1px solid #1a2a30;
  padding:8px;
  margin-bottom:6px;
}
</style>
</head>

<body>

<div id="hdr">
  <div>VIGILHEX RADAR</div>
  <div id="status">CONNECTING</div>
</div>

<canvas id="globe"></canvas>

<div class="panel">
  <div class="stat">TOTAL: <span id="total">0</span></div>
  <div class="stat">ANOMALY: <span id="ano">0</span></div>
</div>

<script>
const WORKER_URL="https://vigilhex-proxy.suegboy666.workers.dev";

let scene,camera,renderer,controls;
let globe,pointsGroup,linesGroup;

init();
animate();
fetchData();

function init(){
  const canvas=document.getElementById("globe");

  scene=new THREE.Scene();

  camera=new THREE.PerspectiveCamera(60,window.innerWidth/window.innerHeight,0.1,1000);
  camera.position.z=2.5;

  renderer=new THREE.WebGLRenderer({canvas,antialias:true});
  renderer.setSize(window.innerWidth,window.innerHeight);
  renderer.setPixelRatio(window.devicePixelRatio);

  // GLOBE
  const geo=new THREE.SphereGeometry(1,64,64);
  const tex=new THREE.TextureLoader().load("https://threejs.org/examples/textures/earth_atmos_2048.jpg");

  const mat=new THREE.MeshStandardMaterial({
    map:tex,
    emissive:new THREE.Color(0x111111)
  });

  globe=new THREE.Mesh(geo,mat);
  scene.add(globe);

  // WIREFRAME
  const wire=new THREE.Mesh(
    geo,
    new THREE.MeshBasicMaterial({
      color:0xff5500,
      wireframe:true,
      transparent:true,
      opacity:0.05
    })
  );
  scene.add(wire);

  // LIGHTS
  const light=new THREE.PointLight(0xffffff,1.5);
  light.position.set(5,3,5);
  scene.add(light);
  scene.add(new THREE.AmbientLight(0x404040));

  // GROUPS
  pointsGroup=new THREE.Group();
  linesGroup=new THREE.Group();
  scene.add(pointsGroup);
  scene.add(linesGroup);

  // CONTROLS
  controls=new THREE.OrbitControls(camera,renderer.domElement);
  controls.enablePan=false;

  window.addEventListener("resize",resize);
}

function animate(){
  requestAnimationFrame(animate);

  globe.rotation.y+=0.0007;

  // flicker linee stile radar
  linesGroup.children.forEach(l=>{
    l.material.opacity=Math.random()*0.5+0.2;
  });

  renderer.render(scene,camera);
}

function resize(){
  camera.aspect=window.innerWidth/window.innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(window.innerWidth,window.innerHeight);
}

// CONVERSIONE LAT/LON
function toVec(lat,lon,r=1){
  const phi=(90-lat)*Math.PI/180;
  const theta=(lon+180)*Math.PI/180;

  return new THREE.Vector3(
    -r*Math.sin(phi)*Math.cos(theta),
    r*Math.cos(phi),
    r*Math.sin(phi)*Math.sin(theta)
  );
}

// FETCH DATI
async function fetchData(){
  try{
    const res=await fetch(WORKER_URL);
    const data=await res.json();

    render(data.states||[]);
    document.getElementById("status").innerText="LIVE";

    setTimeout(fetchData,60000);

  }catch(e){
    document.getElementById("status").innerText="ERROR";
    console.error(e);
    setTimeout(fetchData,60000);
  }
}

// RENDER
function render(list){

  pointsGroup.clear();
  linesGroup.clear();

  let total=0;

  list.slice(0,600).forEach(ac=>{
    const lat=ac[6];
    const lon=ac[5];
    if(!lat||!lon)return;

    total++;

    const pos=toVec(lat,lon,1.01);

    // PUNTO
    const p=new THREE.Mesh(
      new THREE.SphereGeometry(0.01,6,6),
      new THREE.MeshBasicMaterial({color:0xff3300})
    );
    p.position.copy(pos);
    pointsGroup.add(p);

    // LINEA DINAMICA
    const target=toVec(
      lat+(Math.random()*10-5),
      lon+(Math.random()*10-5),
      1.01
    );

    const geo=new THREE.BufferGeometry().setFromPoints([pos,target]);

    const line=new THREE.Line(
      geo,
      new THREE.LineBasicMaterial({
        color:0xff5500,
        transparent:true,
        opacity:0.4
      })
    );

    linesGroup.add(line);
  });

  document.getElementById("total").innerText=total;
}
</script>

</body>
</html>
