<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <title>3D Tech Globe Style</title>
    <style>
        body { margin: 0; background-color: #000; overflow: hidden; }
        canvas { display: block; }
    </style>
</head>
<body>

<script type="module">
    import * as THREE from 'https://cdn.skypack.dev/three@0.136.0';
    import { OrbitControls } from 'https://cdn.skypack.dev/three@0.136.0/examples/jsm/controls/OrbitControls.js';

    // 1. Setup Scena
    const scene = new THREE.Scene();
    const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
    const renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
    renderer.setSize(window.innerWidth, window.innerHeight);
    renderer.setPixelRatio(window.devicePixelRatio);
    document.body.appendChild(renderer.domElement);

    const controls = new OrbitControls(camera, renderer.domElement);
    camera.position.z = 15;

    // 2. Creazione del Globo (Linee Fisse)
    // Usiamo una sfera con pochi segmenti per evidenziare la griglia
    const geometry = new THREE.SphereGeometry(5, 32, 32);
    const wireframe = new THREE.WireframeGeometry(geometry);
    const lineMaterial = new THREE.LineBasicMaterial({ 
        color: 0x0088ff, 
        transparent: true, 
        opacity: 0.3 
    });
    const globeLines = new THREE.LineSegments(wireframe, lineMaterial);
    scene.add(globeLines);

    // 3. Nucleo del Globo (Superficie semitrasparente)
    const innerGeom = new THREE.SphereGeometry(4.95, 64, 64);
    const innerMat = new THREE.MeshBasicMaterial({
        color: 0x050505,
        transparent: true,
        opacity: 0.8
    });
    const innerSphere = new THREE.Mesh(innerGeom, innerMat);
    scene.add(innerSphere);

    // 4. Effetto "Punti" (Opzionale: simula le città o nodi)
    const pointsGeom = new THREE.SphereGeometry(5.1, 40, 40);
    const pointsMat = new THREE.PointsMaterial({
        color: 0x00ffff,
        size: 0.05,
        transparent: true,
        opacity: 0.5
    });
    const points = new THREE.Points(pointsGeom, pointsMat);
    scene.add(points);

    // 5. Animazione
    function animate() {
        requestAnimationFrame(animate);
        
        // Rotazione lenta
        globeLines.rotation.y += 0.001;
        innerSphere.rotation.y += 0.001;
        points.rotation.y += 0.001;

        renderer.render(scene, camera);
    }

    // Resize handling
    window.addEventListener('resize', () => {
        camera.aspect = window.innerWidth / window.innerHeight;
        camera.updateProjectionMatrix();
        renderer.setSize(window.innerWidth, window.innerHeight);
    });

    animate();
</script>
</body>
</html>
